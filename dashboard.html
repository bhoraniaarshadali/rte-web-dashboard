<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1e3a5f">
    <title>RTE Live Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f1f5f9;
            --surface: #ffffff;
            --surface-2: #f8fafc;
            --text: #1e293b;
            --muted: #64748b;
            --muted-2: #94a3b8;
            --border: #e2e8f0;
            --blue: #2563eb;
            --blue-2: #3b82f6;
            --green: #10b981;
            --yellow: #f59e0b;
            --red: #ef4444;
            --radius: 14px;
            --radius-lg: 18px;
            --tap: 44px;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.07);
            --shadow-2: 0 4px 12px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: calc(96px + env(safe-area-inset-bottom));
        }

        button,
        input,
        select {
            font: inherit;
        }

        button,
        a {
            touch-action: manipulation;
        }

        header {
            background: linear-gradient(135deg, #1e3a5f, #2563eb);
            color: white;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
            align-items: stretch;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.16);
        }

        .header-main {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }

        .title-wrap {
            min-width: 0;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        #lastSync {
            font-size: 0.82rem;
            opacity: 0.86;
            margin-top: 5px;
            line-height: 1.35;
        }

        .live-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
            flex: 0 0 auto;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }

        .header-actions {
            display: none;
            gap: 10px;
            align-items: center;
        }

        .btn {
            min-height: var(--tap);
            padding: 0.75rem 1rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 600;
            transition: transform 0.16s ease, opacity 0.16s ease, box-shadow 0.16s ease;
            white-space: nowrap;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-pdf {
            background: #2563eb;
            color: white;
        }

        .btn-alt {
            background: #f59e0b;
            color: white;
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
            padding: 1rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .stat {
            background: white;
            border-radius: var(--radius);
            padding: 1rem;
            cursor: pointer;
            border-left: 5px solid #e2e8f0;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
            box-shadow: var(--shadow);
            min-height: 92px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat:active {
            transform: scale(0.99);
        }

        .stat.active {
            box-shadow: var(--shadow-2);
            transform: translateY(-1px);
        }

        .stat.s-total {
            border-left-color: #94a3b8;
        }

        .stat.s-approved {
            border-left-color: #10b981;
        }

        .stat.s-submitted {
            border-left-color: #3b82f6;
        }

        .stat.s-pending {
            border-left-color: #f59e0b;
        }

        .stat.s-error {
            border-left-color: #ef4444;
        }

        .stat .num {
            font-size: 1.7rem;
            font-weight: 700;
            line-height: 1;
        }

        .stat .lbl {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 4px;
            letter-spacing: 0.02em;
        }

        .toolbar {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 0.8rem;
            align-items: stretch;
        }

        .search {
            width: 100%;
            min-height: var(--tap);
            padding: 0.8rem 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 0.95rem;
            outline: none;
            background: white;
            box-shadow: var(--shadow);
        }

        .search:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        #areaFilter {
            width: 100%;
            min-height: var(--tap);
            padding: 0.8rem 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 0.95rem;
            background: white;
            outline: none;
            box-shadow: var(--shadow);
        }

        .table-wrap {
            background: white;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid rgba(226, 232, 240, 0.7);
        }

        .table-header {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid #f1f5f9;
            color: var(--muted);
            font-size: 0.82rem;
            background: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--surface-2);
            padding: 0.85rem 1rem;
            text-align: left;
            font-size: 0.72rem;
            color: var(--muted-2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid #f1f5f9;
            white-space: nowrap;
        }

        td {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid #f8fafc;
            font-size: 0.88rem;
            vertical-align: middle;
        }

        tr:hover td {
            background: #fafafa;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 0.3rem 0.7rem;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .b-approved {
            background: #dcfce7;
            color: #15803d;
        }

        .b-submitted {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .b-pending {
            background: #fef3c7;
            color: #b45309;
        }

        .b-error {
            background: #fee2e2;
            color: #dc2626;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .ic-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: transform 0.15s ease, opacity 0.15s ease;
            flex: 0 0 auto;
        }

        .ic-btn:active {
            transform: scale(0.96);
        }

        .ic-sync {
            background: #3b82f6;
        }

        .ic-wa {
            background: #25d366;
        }

        .ic-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        .spinning svg {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .mobile-cell,
        .dob-cell {
            font-size: 0.82rem;
            color: #475569;
            white-space: nowrap;
        }

        .no-data {
            text-align: center;
            padding: 2.5rem 1.2rem;
            color: var(--muted-2);
        }

        .no-data h3 {
            font-size: 1.05rem;
            margin-top: 0.8rem;
            color: #334155;
        }

        .record-cards {
            display: grid;
            gap: 0.8rem;
            padding: 0.85rem;
        }

        .record-card {
            background: #fff;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            box-shadow: var(--shadow);
            padding: 0.95rem;
        }

        .record-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .record-title {
            min-width: 0;
        }

        .record-title strong {
            display: block;
            font-size: 0.98rem;
            line-height: 1.25;
            color: #0f172a;
        }

        .record-title span {
            display: block;
            margin-top: 0.2rem;
            font-size: 0.8rem;
            color: var(--muted);
            word-break: break-word;
        }

        .record-badge {
            flex: 0 0 auto;
        }

        .record-meta {
            display: grid;
            gap: 0.55rem;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            gap: 0.75rem;
            font-size: 0.85rem;
            line-height: 1.35;
        }

        .meta-label {
            color: var(--muted);
            flex: 0 0 auto;
            font-weight: 600;
        }

        .meta-value {
            color: #0f172a;
            text-align: right;
            min-width: 0;
            word-break: break-word;
        }

        .record-status {
            margin-top: 0.8rem;
            padding: 0.75rem;
            border-radius: 14px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            font-size: 0.84rem;
            color: #334155;
            line-height: 1.45;
        }

        .record-actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.65rem;
            margin-top: 0.9rem;
        }

        .record-action {
            min-height: 44px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.45rem;
            font-size: 0.82rem;
            font-weight: 700;
            color: white;
        }

        .record-action svg {
            width: 15px;
            height: 15px;
            fill: currentColor;
        }

        .ra-sync {
            background: #3b82f6;
        }

        .ra-wa {
            background: #25d366;
        }

        .mobile-nav {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 200;

            display: flex;
            gap: 10px;
            justify-content: space-between;

            padding: 0.6rem 0.8rem calc(0.6rem + env(safe-area-inset-bottom));

            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid #e2e8f0;

            max-width: 100%;
        }

        .mobile-nav button {
            flex: 1;
            min-height: 44px;
            border-radius: 12px;

            font-size: 0.82rem;
            font-weight: 600;

            background: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        }

        .mobile-nav button:active {
            transform: scale(0.98);
        }

        .mobile-nav .primary {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
        }

        .mobile-nav .warning {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }

        .mobile-nav .active {
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.22);
        }

        .mobile-only {
            display: block;
        }

        .desktop-only {
            display: none;
        }

        @media (hover:hover) and (pointer:fine) {
            .stat:hover {
                transform: translateY(-2px);
                box-shadow: var(--shadow-2);
            }

            .btn:hover {
                opacity: 0.95;
                transform: translateY(-1px);
            }

            .ic-btn:hover {
                opacity: 0.9;
                transform: scale(1.03);
            }

            .mobile-nav button:hover {
                opacity: 0.95;
            }
        }

        @media (min-width: 600px) {
            .stats {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            .toolbar {
                flex-direction: row;
            }

            .search {
                flex: 1;
            }

            #areaFilter {
                width: 260px;
                flex: 0 0 260px;
            }
        }

        @media (min-width: 768px) {
            .container {
                padding: 1.2rem;
            }

            .stats {
                grid-template-columns: repeat(5, minmax(0, 1fr));
            }

            .record-cards {
                padding: 1rem;
            }

            header {
                padding: 1.1rem 1.3rem;
            }

            header h1 {
                font-size: 1.5rem;
            }
        }

        @media (min-width: 1024px) {
            body {
                padding-bottom: 0;
            }

            header {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                gap: 1rem;
            }

            .header-main {
                width: auto;
                align-items: center;
            }

            .header-actions {
                display: flex;
            }

            .container {
                max-width: 1500px;
                padding: 1.2rem;
            }

            .btn {
                min-height: 46px;
                padding: 0.78rem 1.25rem;
            }

            .mobile-only {
                display: none;
            }

            .desktop-only {
                display: block;
            }

            .mobile-nav {
                border-radius: 0;
                /* REMOVE capsule effect */
            }

            .table-header {
                padding: 0.8rem 1.3rem;
            }

            .table-wrap,
            .record-cards {
                margin-bottom: 80px;
            }
        }

        @media print {

            header,
            .toolbar,
            .stats,
            .actions,
            .mobile-nav,
            th:last-child,
            td:last-child {
                display: none !important;
            }

            body {
                background: white;
                padding-bottom: 0;
            }

            .table-wrap {
                box-shadow: none;
                border: none;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="header-main">
            <div class="title-wrap">
                <h1>🏫 RTE Live Dashboard</h1>
                <div id="lastSync"><span class="live-dot"></span>Loading...</div>
            </div>
        </div>

        <div class="header-actions desktop-only">
            <button class="btn btn-alt" onclick="location.href='analysis.html'">Full Analysis</button>
            <button class="btn btn-pdf" onclick="window.print()">Print PDF</button>
        </div>
    </header>

    <div class="container">

        <div class="stats">
            <div class="stat s-total active" onclick="setFilter('ALL',this)">
                <div class="num" id="sTotal">—</div>
                <div class="lbl">Total</div>
            </div>
            <div class="stat s-approved" onclick="setFilter('APPROVED',this)">
                <div class="num" id="sApproved">—</div>
                <div class="lbl">Approved</div>
            </div>
            <div class="stat s-submitted" onclick="setFilter('SUBMITTED',this)">
                <div class="num" id="sSubmitted">—</div>
                <div class="lbl">Submitted</div>
            </div>
            <div class="stat s-pending" onclick="setFilter('PENDING',this)">
                <div class="num" id="sPending">—</div>
                <div class="lbl">Pending</div>
            </div>
            <div class="stat s-error" onclick="setFilter('ERROR',this)">
                <div class="num" id="sError">—</div>
                <div class="lbl">Rejected</div>
            </div>
        </div>

        <div class="toolbar">
            <input class="search" id="search" type="text"
                placeholder="🔍 Search Token, Application ID, Child Name, Mobile..." oninput="render()">

            <select id="areaFilter" onchange="render()">
                <option value="ALL">All Areas</option>
            </select>
        </div>

        <div class="table-wrap">
            <div class="table-header" id="tableInfo">Loading data...</div>
            <div id="tableWrap">
                <div class="no-data">
                    <div style="font-size:2.5rem">📊</div>
                    <h3>Waiting for data...</h3>
                    <p style="margin-top:0.5rem;font-size:0.85rem">Run <code>python rte_checker.py</code></p>
                </div>
            </div>
        </div>

    </div>

    <nav class="mobile-nav mobile-only" aria-label="Mobile navigation">
        <button class="primary active" onclick="location.href='dashboard.html'">Home</button>
        <button class="warning" onclick="location.href='analysis.html'">Analysis</button>
        <button onclick="window.print()">Print</button>
    </nav>

    <script>
        let ALL_DATA = [];
        let FILTER = 'ALL';
        let CURRENT_AREA = 'ALL';
        let _tableData = [];
        let _lastRenderedMode = null;

        function isMobileView() {
            return window.innerWidth < 768;
        }

        function reloadData() {
            const s = document.createElement('script');
            s.src = 'data.js?t=' + Date.now();
            s.onload = () => {
                if (typeof RTE_DATA !== 'undefined') {
                    ALL_DATA = RTE_DATA.filter(r => {
                        const status = String(r['Status (Gujarati)'] || '').trim();
                        return status !== "Status not found";
                    });

                    updateSummaryFromFilteredData();
                    populateAreaDropdown();
                    render();
                }
            };
            s.onerror = () => {
                document.getElementById('lastSync').innerHTML =
                    '<span class="live-dot" style="background:#ef4444"></span>' +
                    'data.js not found — run Python script first';
            };
            document.head.appendChild(s);
            setTimeout(() => { try { s.remove(); } catch { } }, 6000);
        }

        function populateAreaDropdown() {
            const select = document.getElementById('areaFilter');
            const currentValue = select.value;

            const gamSet = new Set();
            ALL_DATA.forEach(r => {
                const gam = String(r.Gam || '').trim();
                if (gam && gam !== 'N/A' && gam !== 'nan' && gam !== 'NONE') {
                    gamSet.add(gam);
                }
            });

            select.innerHTML = `<option value="ALL">All Areas</option>`;

            const sortedGams = Array.from(gamSet).sort();
            sortedGams.forEach(gam => {
                const option = document.createElement('option');
                option.value = gam;
                option.textContent = gam;
                select.appendChild(option);
            });

            if (currentValue && Array.from(select.options).some(opt => opt.value === currentValue)) {
                select.value = currentValue;
            }
        }

        function updateSummaryFromFilteredData() {
            const total = ALL_DATA.length;
            const approved = ALL_DATA.filter(r => r.Result === 'APPROVED').length;
            const submitted = ALL_DATA.filter(r => r.Result === 'SUBMITTED').length;
            const pending = ALL_DATA.filter(r => r.Result === 'PENDING').length;
            const error = ALL_DATA.filter(r => r.Result === 'ERROR').length;

            document.getElementById('sTotal').textContent = total;
            document.getElementById('sApproved').textContent = approved;
            document.getElementById('sSubmitted').textContent = submitted;
            document.getElementById('sPending').textContent = pending;
            document.getElementById('sError').textContent = error;

            if (typeof RTE_SUMMARY !== 'undefined') {
                document.getElementById('lastSync').innerHTML =
                    `<span class="live-dot"></span>Last sync: ${RTE_SUMMARY.last_updated}`;
            }
        }

        function setFilter(f, el) {
            FILTER = f;
            document.querySelectorAll('.stat').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
            render();
        }

        function render() {
            const q = document.getElementById('search').value.toLowerCase();
            CURRENT_AREA = document.getElementById('areaFilter').value;

            _tableData = ALL_DATA.filter(r => {
                const inStatusFilter = FILTER === 'ALL' || r.Result === FILTER;

                const inAreaFilter = CURRENT_AREA === 'ALL' ||
                    String(r.Gam || '').trim() === CURRENT_AREA;

                const inSearch = q === '' ||
                    String(r['Token No']).toLowerCase().includes(q) ||
                    String(r['Application Id']).toLowerCase().includes(q) ||
                    String(r['Child Name']).toLowerCase().includes(q) ||
                    String(r['Mobile']).toLowerCase().includes(q);

                return inStatusFilter && inAreaFilter && inSearch;
            });

            document.getElementById('tableInfo').textContent =
                `Showing ${_tableData.length} of ${ALL_DATA.length} records`;

            if (_tableData.length === 0) {
                document.getElementById('tableWrap').innerHTML = `
                    <div class="no-data">
                        <div style="font-size:2.5rem">🔍</div>
                        <h3>No records found</h3>
                    </div>`;
                return;
            }

            if (isMobileView()) {
                renderMobileCards(_tableData);
                _lastRenderedMode = 'mobile';
            } else {
                renderDesktopTable(_tableData);
                _lastRenderedMode = 'desktop';
            }
        }

        function renderDesktopTable(tableData) {
            const rows = tableData.map((r) => {
                const cat = (r.Result || 'PENDING').toLowerCase();
                const isActionable = r.Result === 'PENDING' || r.Result === 'ERROR';
                const mobile = (r.Mobile && r.Mobile !== 'N/A' && r.Mobile !== 'nan') ? r.Mobile : '—';
                const dob = (r.DOB && r.DOB !== 'nan') ? r.DOB : '—';

                return `<tr>
                    <td><b style="color:#64748b">#${r['Token No'] || '—'}</b></td>
                    <td><b style="color:#2563eb;white-space:nowrap">${r['Application Id'] || '—'}</b></td>
                    <td style="font-weight:600;max-width:200px">${r['Child Name'] || '—'}</td>
                    <td class="dob-cell">${dob}</td>
                    <td class="mobile-cell">${mobile}</td>
                    <td style="font-size:0.8rem;color:#475569;max-width:280px;line-height:1.4">${r['Status (Gujarati)'] || '—'}</td>
                    <td><span class="badge b-${cat}">${r.Result || 'PENDING'}</span></td>
                    <td>
                        <div class="actions">
                            <button class="ic-btn ic-sync" title="Force Sync" onclick="syncOne('${r['Application Id']}', this)">
                                <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
                            </button>
                            ${isActionable && mobile !== '—' ? `
                            <button class="ic-btn ic-wa" title="Send WhatsApp" onclick="sendWAByAppId('${r['Application Id']}')">
                                <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                            </button>` : ''}
                        </div>
                    </td>
                </tr>`;
            }).join('');

            document.getElementById('tableWrap').innerHTML = `
                <div style="overflow-x:auto">
                    <table>
                        <thead><tr>
                            <th style="width:65px">Token</th>
                            <th style="width:210px">Application ID</th>
                            <th style="width:190px">Child Name</th>
                            <th style="width:100px">DOB</th>
                            <th style="width:115px">Mobile</th>
                            <th>Status</th>
                            <th style="width:110px">Result</th>
                            <th style="width:90px">Actions</th>
                        </tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>`;
        }

        function renderMobileCards(tableData) {
            const cards = tableData.map((r) => {
                const cat = (r.Result || 'PENDING').toLowerCase();
                const isActionable = r.Result === 'PENDING' || r.Result === 'ERROR';
                const mobile = (r.Mobile && r.Mobile !== 'N/A' && r.Mobile !== 'nan') ? r.Mobile : '—';
                const dob = (r.DOB && r.DOB !== 'nan') ? r.DOB : '—';

                return `
                    <article class="record-card">
                        <div class="record-top">
                            <div class="record-title">
                                <strong>#${r['Token No'] || '—'} · ${r['Child Name'] || '—'}</strong>
                                <span>${r['Application Id'] || '—'}</span>
                            </div>
                            <div class="record-badge">
                                <span class="badge b-${cat}">${r.Result || 'PENDING'}</span>
                            </div>
                        </div>

                        <div class="record-meta">
                            <div class="meta-row">
                                <span class="meta-label">DOB</span>
                                <span class="meta-value">${dob}</span>
                            </div>
                            <div class="meta-row">
                                <span class="meta-label">Mobile</span>
                                <span class="meta-value">${mobile}</span>
                            </div>
                            <div class="meta-row">
                                <span class="meta-label">Area</span>
                                <span class="meta-value">${r.Gam || '—'}</span>
                            </div>
                        </div>

                        <div class="record-status">
                            ${r['Status (Gujarati)'] || '—'}
                        </div>

                        <div class="record-actions">
                            <button class="record-action ra-sync" title="Force Sync" onclick="syncOne('${r['Application Id']}', this)">
                                <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
                                Sync
                            </button>
                            ${isActionable && mobile !== '—' ? `
                                <button class="record-action ra-wa" title="Send WhatsApp" onclick="sendWAByAppId('${r['Application Id']}')">
                                    <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                                    WhatsApp
                                </button>` : `
                                <div></div>
                            `}
                        </div>
                    </article>
                `;
            }).join('');

            document.getElementById('tableWrap').innerHTML = `
                <div class="record-cards">
                    ${cards}
                </div>
            `;
        }

        async function syncOne(appId, btn) {
            btn.classList.add('spinning');
            try {
                const r = await fetch(`http://localhost:5001/sync?app_id=${encodeURIComponent(appId)}`);
                const j = await r.json();
                if (j.status === 'success') setTimeout(reloadData, 2500);
            } catch {
                alert('Python script not running!\nStart: python rte_checker.py');
            } finally {
                btn.classList.remove('spinning');
            }
        }

        function sendWAByAppId(appId) {
            const r = ALL_DATA.find(record => String(record['Application Id']) === String(appId));
            if (!r) return alert("Record not found!");

            const mobile = String(r.Mobile || '').replace(/\.0$/, '').replace(/\D/g, '').trim();
            const dob = r.DOB || '';
            const result = r.Result || 'PENDING';

            let statusMsg = result === 'ERROR'
                ? `તમારું ફોર્મ રિજેક્ટ થયું છે ❌\nસ્ટેટસ: *${r['Status (Gujarati)']}*`
                : result === 'PENDING'
                    ? `તમારું ફોર્મ હજુ સમીક્ષા હેઠળ છે ⏳\nકૃપા કરીને થોડા દિવસ રાહ જુઓ.`
                    : `તમારું ફોર્મ સ્ટેટસ: *${r['Status (Gujarati)']}*`;

            const msg = `${String.fromCodePoint(0x1F4FF)} *અસ્સલામુઅલેકુમ - નમસ્તે* ${String.fromCodePoint(0x1F64F)}

*શૈખુલ ઈસ્લામ ટ્રસ્ટ, સુરત RTE માટે અવિરત ખિદમત અદા કરી રહ્યું છે.*

તમારા પુત્ર/પુત્રીનું નામ: *${r['Child Name']}*
જન્મ તારીખ: *${dob}*
એપ્લિકેશન નંબર: *${r['Application Id']}*

${statusMsg}

કૃપા કરીને ઓફિસ પર આવીને તમારું ફોર્મ અપડેટ કરી જાવ.
-------------------------------------------------------
${String.fromCodePoint(0x23F0)} *ઓફિસ સમય:* સવારે ૧૦ થી રાત્રે ૧૦ વાગ્યા સુધી
*શૈખુલ ઈસ્લામ ટ્રસ્ટ* ${String.fromCodePoint(0x2728)}
${String.fromCodePoint(0x1F4CD)} *સુરત બ્રાંનચ ૧૦૪*
${String.fromCodePoint(0x1F4DE)} 7865009200 | 7865007200 | 7864007200`;

            const url = mobile ? `https://wa.me/91${mobile}?text=${encodeURIComponent(msg)}` : `https://wa.me/?text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
        }

        let resizeTimer = null;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                if (_tableData.length > 0) {
                    const mode = isMobileView() ? 'mobile' : 'desktop';
                    if (mode !== _lastRenderedMode) {
                        render();
                    }
                }
            }, 180);
        });

        reloadData();
        setInterval(reloadData, 3000);
    </script>
</body>
