<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTE Strategic Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        header {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 12px 30px -10px rgba(0, 0, 0, 0.4);
        }

        .stat-card {
            text-align: center;
        }

        .stat-val {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to bottom right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-lbl {
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .chart-container {
            grid-column: span 2;
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }

        .chart-container.wide {
            grid-column: span 3;
        }

        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #cbd5e1;
            display: flex;
            justify-content: space-between;
        }

        .map-section {
            grid-column: span 5;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        #map {
            height: 500px;
            border-radius: 12px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .area-list {
            list-style: none;
            margin-top: 0;
            overflow-y: auto;
            max-height: 460px;
            padding-right: 8px;
        }

        .area-item {
            display: flex;
            justify-content: space-between;
            padding: 0.7rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.88rem;
        }

        .area-count {
            font-weight: 700;
            color: #3b82f6;
        }

        .area-note {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 0.5rem;
            padding: 0.5rem 0.8rem;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .gender-split {
            display: flex;
            gap: 2rem;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .gender-box {
            text-align: center;
            flex: 1;
        }

        .g-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .g-val {
            font-size: 2rem;
            font-weight: 700;
        }

        .g-lbl {
            font-size: 0.8rem;
            color: #64748b;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-green 1.5s infinite;
        }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(74, 222, 128, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }

        .back-btn {
            color: #94a3b8;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 600;
        }


        @media (max-width: 1200px) {
            .grid { grid-template-columns: repeat(3, 1fr); }
            .chart-container, .map-section { grid-column: span 3; }
        }

        @media (max-width: 900px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
            .chart-container, .map-section, .chart-container.wide { grid-column: span 2; }
            .map-section div[style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
            #map { height: 350px; }
        }

        @media (max-width: 600px) {
            header { padding: 1rem; flex-direction: column; gap: 0.5rem; }
            .container { padding: 1rem; }
            .grid { grid-template-columns: 1fr; }
            .chart-container, .map-section, .chart-container.wide { grid-column: span 1; }
            .stat-val { font-size: 2rem; }
            .gender-split { flex-direction: column; gap: 1.5rem; }
        }



    </style>
</head>

<body>

    <header>
        <div style="display:flex;align-items:center;gap:20px">
            <a href="dashboard.html" class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>

            </a>
            <h1 style="font-size:1.4rem;font-weight:700;letter-spacing:-0.5px">Strategic Analysis</h1>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
            <div class="live-dot"></div>
            <div style="font-size:0.85rem;font-weight:500;color:#94a3b8" id="updateTs">Syncing...</div>
        </div>
    </header>

    <div class="container">
        <div class="grid">

            <!-- Stats Row -->
            <div class="card stat-card">
                <div class="stat-val" id="tTotal">—</div>
                <div class="stat-lbl">Total Applications</div>
            </div>
            <div class="card stat-card">
                <div class="stat-val" id="tApproved"
                    style="background:linear-gradient(to bottom right,#4ade80,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent">
                    —</div>
                <div class="stat-lbl">Approved</div>
            </div>
            <div class="card stat-card">
                <div class="stat-val" id="tSubmitted"
                    style="background:linear-gradient(to bottom right,#60a5fa,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent">
                    —</div>
                <div class="stat-lbl">In Review</div>
            </div>
            <div class="card stat-card">
                <div class="stat-val" id="tPending"
                    style="background:linear-gradient(to bottom right,#f59e0b,#d97706);-webkit-background-clip:text;-webkit-text-fill-color:transparent">
                    —</div>
                <div class="stat-lbl">Pending</div>
            </div>
            <div class="card stat-card">
                <div class="stat-val" id="tRejected"
                    style="background:linear-gradient(to bottom right,#f87171,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent">
                    —</div>
                <div class="stat-lbl">Rejected</div>
            </div>

            <!-- Gender -->
            <div class="card chart-container">
                <div class="chart-title">Gender Distribution <span>Ratio Analysis</span></div>
                <div class="gender-split">
                    <div class="gender-box">
                        <div class="g-icon">👦</div>
                        <div class="g-val" id="vBoys">0</div>
                        <div class="g-lbl">BOYS</div>
                    </div>
                    <div style="width:200px"><canvas id="genderChart"></canvas></div>
                    <div class="gender-box">
                        <div class="g-icon">👧</div>
                        <div class="g-val" id="vGirls">0</div>
                        <div class="g-lbl">GIRLS</div>
                    </div>
                </div>
            </div>

            <!-- Status Bar Chart -->
            <div class="card chart-container wide">
                <div class="chart-title">Application Status <span>Global View</span></div>
                <div style="height:300px;position:relative"><canvas id="statusChart"></canvas></div>
            </div>

            <!-- Map + Area List -->
            <div class="map-section">
                <div class="chart-title" style="margin-bottom:1rem">
                    Geographical Distribution
                    <span id="areaCountInfo" style="font-size:0.82rem;color:#64748b;font-weight:400"></span>
                </div>
                <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px">
                    <div id="map"></div>
                    <div class="card" style="padding:1.2rem;background:rgba(15,23,42,0.3)">
                        <div
                            style="font-size:0.9rem;font-weight:700;color:#3b82f6;text-transform:uppercase;letter-spacing:1px;margin-bottom:0.5rem">
                            Top Application Areas
                        </div>
                        <div class="area-note" id="areaCoverageNote"></div>
                        <ul id="areaList" class="area-list" style="margin-top:0.8rem"></ul>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let MAP;
        let MARKERS = [];
        let genderChartObj = null;
        let statusChartObj = null;

        const AREA_COORDS = {
            'GOPIPURA': [21.1947, 72.8262], 'SAGRAMPURA': [21.1813, 72.8227], 'SALABATPURA': [21.1895, 72.8346],
            'SALABTPURA': [21.1895, 72.8346], 'RUSTAMPURA': [21.1876, 72.8309], 'NANPURA': [21.1888, 72.8250],
            'BEGAMPURA': [21.1961, 72.8358], 'BEGUMPURA': [21.1961, 72.8358], 'UMARWADA': [21.1968, 72.8521],
            'LIMBAYAT': [21.1750, 72.8650], 'RANDER': [21.2125, 72.7917], 'BHESTAN': [21.1216, 72.8611],
            'RUDARPURA': [21.1738, 72.8225], 'UDHNA': [21.1415, 72.8422], 'VARACHHA': [21.2140, 72.8654],
            'KATARGAM': [21.2266, 72.8277], 'ADHAJAN': [21.1818, 72.7958], 'VESU': [21.1396, 72.7761],
            'PIPLOD': [21.1578, 72.7689], 'DINDOLI': [21.1360, 72.8633], 'CHOWK': [21.1960, 72.8220],
            'MAHIDHARPURA': [21.2023, 72.8335], 'SAIYEDPURA': [21.2050, 72.8265], 'SAIYADPURA': [21.2050, 72.8265],
            'BHATHENA': [21.1685, 72.8480], 'LAL DARWAJA': [21.2062, 72.8351], 'NAVSARI BAZAR': [21.1852, 72.8225],
            'ZAMPA BAZAR': [21.1970, 72.8320], 'MOMNAWAD': [21.1895, 72.8250], 'KAPADWANJ': [21.2100, 72.8400],
            'ZAMPA': [21.1970, 72.8320]
        };

        function initMap() {
            MAP = L.map('map', { zoomControl: false, attributionControl: false })
                .setView([21.1702, 72.8311], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(MAP);
        }

        function loadData() {
            const s = document.createElement('script');
            s.src = 'data.js?t=' + Date.now();
            s.onload = () => {
                if (typeof RTE_DATA !== 'undefined') {
                    // === FILTER "Status not found" RECORDS ===
                    const filteredData = RTE_DATA.filter(r => {
                        const status = String(r['Status (Gujarati)'] || '').trim();
                        return status !== "Status not found";
                    });

                    updateUI(filteredData, RTE_SUMMARY || {});
                }
            };
            document.head.appendChild(s);
            setTimeout(() => { try { s.remove(); } catch { } }, 6000);
        }

        function updateUI(data, originalSummary) {
            // Top Stats + Status Chart → include everything (except Status not found)
            const total = data.length;
            const approved = data.filter(r => r.Result === 'APPROVED').length;
            const submitted = data.filter(r => r.Result === 'SUBMITTED').length;
            const pending = data.filter(r => r.Result === 'PENDING').length;
            const error = data.filter(r => r.Result === 'ERROR').length;

            document.getElementById('tTotal').textContent = total;
            document.getElementById('tApproved').textContent = approved;
            document.getElementById('tSubmitted').textContent = submitted;
            document.getElementById('tPending').textContent = pending;
            document.getElementById('tRejected').textContent = error;
            document.getElementById('updateTs').textContent = 'Last sync: ' + (originalSummary.last_updated || 'Just now');

            // === GENDER RATIO ANALYSIS → EXCLUDE REJECTED ===
            const genderData = data.filter(r => r.Result !== 'ERROR');

            let girls = 0, boys = 0;
            let statusCounts = { APPROVED: 0, SUBMITTED: 0, PENDING: 0, ERROR: 0 };
            let areaCounts = {};
            let withArea = 0;

            // Gender counting only from non-Rejected records
            genderData.forEach(r => {
                const g = String(r.Gender || '').toLowerCase();
                if (g.includes('girl') || g.includes('female') || g.includes('kanya') || g.includes('કન્યા')) girls++;
                else if (g.includes('boy') || g.includes('male') || g.includes('kumar') || g.includes('કુમાર')) boys++;
            });

            // Status counts (for bar chart) - full data
            data.forEach(r => {
                const res = r.Result || 'PENDING';
                if (statusCounts[res] !== undefined) statusCounts[res]++;

                const gam = String(r.Gam || '').trim().toUpperCase();
                if (gam && gam !== 'N/A' && gam !== 'NAN' && gam !== '' && gam !== 'NONE') {
                    const cleaned = gam.replace(/\s*(CORP\.?|CORPORATION|WARD.*|POLICE.*|NAGAR.*PANCHAYAT)/gi, '')
                        .replace(/\s+/g, ' ').trim();
                    if (cleaned) {
                        areaCounts[cleaned] = (areaCounts[cleaned] || 0) + 1;
                        withArea++;
                    }
                }
            });

            const coveragePct = total > 0 ? Math.round((withArea / total) * 100) : 0;
            document.getElementById('areaCountInfo').textContent = `Mapped: ${withArea} / ${total} (${coveragePct}%)`;

            let noteHtml = `✅ Gender Ratio shows only non-Rejected records (${genderData.length} records)`;
            document.getElementById('areaCoverageNote').innerHTML = noteHtml;

            document.getElementById('vGirls').textContent = girls;
            document.getElementById('vBoys').textContent = boys;

            renderCharts(girls, boys, statusCounts);
            renderAreaList(areaCounts, Object.values(areaCounts).reduce((a, b) => a + b, 0), withArea);
            renderMap(areaCounts);
        }

        function renderCharts(girls, boys, status) {
            if (genderChartObj) genderChartObj.destroy();
            genderChartObj = new Chart(document.getElementById('genderChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Boys', 'Girls'],
                    datasets: [{
                        data: [boys, girls],
                        backgroundColor: ['#3b82f6', '#f472b6'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: { cutout: '70%', plugins: { legend: { display: false } } }
            });

            if (statusChartObj) statusChartObj.destroy();
            statusChartObj = new Chart(document.getElementById('statusChart'), {
                type: 'bar',
                data: {
                    labels: ['Approved', 'In Review', 'Pending', 'Rejected'],
                    datasets: [{
                        label: 'Count',
                        data: [status.APPROVED, status.SUBMITTED, status.PENDING, status.ERROR],
                        backgroundColor: ['#10b981', '#3b82f6', '#f59e0b', '#ef4444'],
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                        x: { grid: { display: false }, ticks: { color: '#64748b' } }
                    }
                }
            });
        }

        function renderAreaList(counts, areaTotal, withArea) {
            const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 20);
            const list = document.getElementById('areaList');

            if (sorted.length === 0) {
                list.innerHTML = '<li class="area-item"><span style="color:#64748b">No area data yet</span></li>';
                return;
            }

            list.innerHTML = `
            <li class="area-item" style="border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:0.5rem;margin-bottom:0.3rem">
                <span style="color:#94a3b8;font-size:0.78rem">AREA (synced ${withArea})</span>
                <span style="color:#94a3b8;font-size:0.78rem">COUNT</span>
            </li>
            ${sorted.map(([area, count]) => `
                <li class="area-item">
                    <span>${area}</span>
                    <span class="area-count">${count}</span>
                </li>
            `).join('')}
            <li class="area-item" style="border-top:1px solid rgba(255,255,255,0.1);margin-top:0.3rem;padding-top:0.5rem">
                <span style="color:#94a3b8;font-weight:600">TOTAL (mapped)</span>
                <span style="color:#60a5fa;font-weight:700">${areaTotal}</span>
            </li>`;
        }

        function renderMap(counts) {
            MARKERS.forEach(m => MAP.removeLayer(m));
            MARKERS = [];

            const sortedKeys = Object.keys(AREA_COORDS).sort((a, b) => b.length - a.length);

            Object.entries(counts).forEach(([area, count]) => {
                let coord = null;
                for (let key of sortedKeys) {
                    if (area.includes(key) || key.includes(area)) {
                        coord = AREA_COORDS[key];
                        break;
                    }
                }
                if (!coord) return;

                const radius = Math.min(Math.max(count * 2, 8), 50);
                const marker = L.circleMarker(coord, {
                    radius, fillColor: '#3b82f6', color: '#60a5fa',
                    weight: 1, opacity: 0.9, fillOpacity: 0.5
                }).addTo(MAP);

                marker.bindPopup(`
                <div style="font-family:'Outfit';padding:6px">
                    <b style="color:#1e293b;font-size:1rem">${area}</b><br>
                    <span style="color:#64748b;font-size:0.8rem">Applications: </span>
                    <b style="color:#3b82f6">${count}</b>
                </div>
            `);
                MARKERS.push(marker);
            });
        }

        window.onload = () => {
            initMap();
            loadData();
            setInterval(loadData, 5000);
        };
    </script>
</body>

</html>
