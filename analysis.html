<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>RTE Strategic Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg-1: #0f172a;
            --bg-2: #1e293b;
            --card: rgba(30, 41, 59, 0.54);
            --card-strong: rgba(15, 23, 42, 0.72);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f8fafc;
            --muted: #94a3b8;
            --muted-2: #64748b;
            --blue: #3b82f6;
            --green: #4ade80;
            --yellow: #f59e0b;
            --red: #ef4444;
            --shadow: 0 12px 30px -10px rgba(0, 0, 0, 0.4);
            --radius: 20px;
            --radius-lg: 24px;
            --tap: 44px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            background-attachment: fixed;
            padding-bottom: calc(92px + env(safe-area-inset-bottom));
        }

        button,
        a,
        input,
        select {
            font: inherit;
        }

        button,
        a {
            touch-action: manipulation;
        }

        header {
            background: rgba(30, 41, 59, 0.82);
            backdrop-filter: blur(14px);
            padding: 0.9rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            align-items: flex-start;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
            width: 100%;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            justify-content: space-between;
        }

        .back-btn {
            color: var(--muted);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: var(--tap);
            height: var(--tap);
            min-width: var(--tap);
            min-height: var(--tap);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
            flex: 0 0 auto;
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
        }

        .back-btn:active {
            transform: scale(0.96);
        }

        .page-title {
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .sync-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--muted);
            min-height: var(--tap);
            padding: 0.55rem 0.8rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            display: inline-block;
            animation: pulse-green 1.5s infinite;
            flex: 0 0 auto;
        }

        @keyframes pulse-green {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 6px rgba(74, 222, 128, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(74, 222, 128, 0);
            }
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.9rem;
            margin-bottom: 1rem;
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(12px);
            border-radius: var(--radius);
            padding: 1rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .card:active {
            transform: scale(0.995);
        }

        .stat-card {
            text-align: center;
            min-height: 96px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-val {
            font-size: 2rem;
            line-height: 1;
            font-weight: 700;
            background: linear-gradient(to bottom right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-lbl {
            color: var(--muted-2);
            font-size: 0.82rem;
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .chart-container {
            min-height: 320px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .chart-container.wide {
            min-height: 320px;
        }

        .chart-title {
            font-size: 1rem;
            font-weight: 600;
            color: #cbd5e1;
            display: flex;
            justify-content: space-between;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .chart-title span {
            color: var(--muted-2);
            font-size: 0.8rem;
            font-weight: 400;
        }

        .chart-frame {
            position: relative;
            width: 100%;
            min-height: 220px;
            flex: 1;
        }

        .chart-frame canvas {
            width: 100% !important;
            height: 100% !important;
        }

        .gender-split {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: stretch;
            justify-content: center;
            min-height: 100%;
        }

        .gender-box {
            text-align: center;
            flex: 1;
            padding: 0.5rem 0;
        }

        .g-icon {
            font-size: 2.4rem;
            margin-bottom: 8px;
        }

        .g-val {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .g-lbl {
            font-size: 0.78rem;
            color: var(--muted-2);
            letter-spacing: 0.08em;
        }

        .map-section {
            grid-column: span 1;
            background: var(--card);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-lg);
            padding: 1rem;
            border: 1px solid var(--border);
        }

        .map-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.9rem;
        }

        #map {
            height: 320px;
            border-radius: 14px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .area-panel {
            padding: 1rem;
            background: var(--card-strong);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .area-list {
            list-style: none;
            margin-top: 0.8rem;
            overflow-y: auto;
            max-height: 280px;
            padding-right: 8px;
        }

        .area-list::-webkit-scrollbar {
            width: 6px;
        }

        .area-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .area-list::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.4);
            border-radius: 10px;
        }

        .area-list::-webkit-scrollbar-thumb:hover {
            background: rgba(59, 130, 246, 0.7);
        }

        .area-item {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.88rem;
        }

        .area-item:last-child {
            border-bottom: none;
        }

        .area-count {
            font-weight: 700;
            color: var(--blue);
            flex: 0 0 auto;
        }

        .area-note {
            font-size: 0.78rem;
            color: var(--muted-2);
            margin-top: 0.5rem;
            padding: 0.55rem 0.8rem;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            line-height: 1.45;
        }

        .mobile-nav {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 200;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 0.8rem 1rem calc(0.8rem + env(safe-area-inset-bottom));
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .mobile-nav button {
            min-height: 48px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .mobile-nav button:active {
            transform: scale(0.98);
        }

        .mobile-nav .primary {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border-color: transparent;
        }

        .mobile-nav .danger {
            background: linear-gradient(135deg, #0f172a, #1e293b);
        }

        .mobile-nav .active {
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
        }

        @media (hover:hover) and (pointer:fine) {
            .back-btn:hover {
                color: #3b82f6;
                transform: translateY(-1px);
                background: rgba(59, 130, 246, 0.08);
            }

            .card:hover {
                transform: translateY(-4px);
                border-color: rgba(59, 130, 246, 0.35);
            }

            .mobile-nav button:hover {
                opacity: 0.92;
            }
        }

        @media (min-width: 640px) {
            .container {
                padding: 1.1rem;
            }

            .grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .chart-container {
                min-height: 360px;
            }

            .chart-container.wide {
                grid-column: span 2;
            }

            .map-grid {
                grid-template-columns: 1.6fr 1fr;
            }

            #map {
                height: 420px;
            }

            .area-list {
                max-height: 370px;
            }

            .gender-split {
                flex-direction: row;
                gap: 1.4rem;
                align-items: center;
            }

            .g-icon {
                font-size: 3rem;
            }

            .g-val {
                font-size: 2rem;
            }
        }

        @media (min-width: 768px) {
            header {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                padding: 1rem 1.3rem;
            }

            .header-left {
                width: auto;
            }

            .header-right {
                width: auto;
                justify-content: flex-end;
            }

            .page-title {
                font-size: 1.3rem;
            }

            .grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            .chart-container {
                min-height: 390px;
            }

            .chart-container.wide {
                grid-column: span 3;
            }

            .map-grid {
                grid-template-columns: 2fr 1fr;
                gap: 1rem;
            }

            #map {
                height: 500px;
            }

            .area-list {
                max-height: 460px;
            }
        }

        @media (min-width: 1024px) {
            body {
                padding-bottom: 0;
            }

            .container {
                padding: 2rem;
            }

            .grid {
                grid-template-columns: repeat(5, minmax(0, 1fr));
                gap: 1rem;
                margin-bottom: 2rem;
            }

            .stat-card {
                min-height: 104px;
            }

            .stat-val {
                font-size: 2.5rem;
            }

            .chart-container {
                grid-column: span 2;
                min-height: 400px;
            }

            .chart-container.wide {
                grid-column: span 3;
            }

            .map-section {
                grid-column: span 5;
                padding: 1.8rem;
                border-radius: 24px;
            }

            .chart-title {
                font-size: 1.1rem;
            }

            .mobile-nav {
                display: none;
            }
        }

        @media (min-width: 1400px) {
            .container {
                padding: 2rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="header-left">
            <a href="dashboard.html" class="back-btn" aria-label="Back to dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
            </a>
            <h1 class="page-title">Strategic Analysis</h1>
        </div>

        <div class="header-right">
            <div class="sync-pill">
                <span class="live-dot"></span>
                <span id="updateTs">Syncing...</span>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="grid">

            <div class="card stat-card">
                <div class="stat-val" id="tTotal">—</div>
                <div class="stat-lbl">Total Applications</div>
            </div>

            <div class="card stat-card">
                <div class="stat-val" id="tApproved"
                    style="background:linear-gradient(to bottom right,#4ade80,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent">
                    —</div>
                <div class="stat-lbl">Approved</div>
            </div>

            <div class="card stat-card">
                <div class="stat-val" id="tSubmitted"
                    style="background:linear-gradient(to bottom right,#60a5fa,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent">
                    —</div>
                <div class="stat-lbl">In Review</div>
            </div>

            <div class="card stat-card">
                <div class="stat-val" id="tPending"
                    style="background:linear-gradient(to bottom right,#f59e0b,#d97706);-webkit-background-clip:text;-webkit-text-fill-color:transparent">
                    —</div>
                <div class="stat-lbl">Pending</div>
            </div>

            <div class="card stat-card">
                <div class="stat-val" id="tRejected"
                    style="background:linear-gradient(to bottom right,#f87171,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent">
                    —</div>
                <div class="stat-lbl">Rejected</div>
            </div>

            <div class="card chart-container">
                <div class="chart-title">Gender Distribution <span>Ratio Analysis</span></div>
                <div class="gender-split">
                    <div class="gender-box">
                        <div class="g-icon">👦</div>
                        <div class="g-val" id="vBoys">0</div>
                        <div class="g-lbl">BOYS</div>
                    </div>
                    <div class="chart-frame">
                        <canvas id="genderChart"></canvas>
                    </div>
                    <div class="gender-box">
                        <div class="g-icon">👧</div>
                        <div class="g-val" id="vGirls">0</div>
                        <div class="g-lbl">GIRLS</div>
                    </div>
                </div>
            </div>

            <div class="card chart-container wide">
                <div class="chart-title">Application Status <span>Global View</span></div>
                <div class="chart-frame" style="min-height:260px">
                    <canvas id="statusChart"></canvas>
                </div>
            </div>

            <div class="map-section">
                <div class="chart-title" style="margin-bottom:1rem">
                    Geographical Distribution
                    <span id="areaCountInfo" style="font-size:0.82rem;color:#64748b;font-weight:400"></span>
                </div>

                <div class="map-grid">
                    <div id="map"></div>
                    <div class="area-panel">
                        <div
                            style="font-size:0.9rem;font-weight:700;color:#3b82f6;text-transform:uppercase;letter-spacing:1px;margin-bottom:0.5rem">
                            Top Application Areas
                        </div>
                        <div class="area-note" id="areaCoverageNote"></div>
                        <ul id="areaList" class="area-list"></ul>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <nav class="mobile-nav" aria-label="Mobile navigation">
        <button class="primary active" onclick="location.href='dashboard.html'">Dashboard</button>
        <button onclick="loadData()">Sync</button>
        <button class="danger" onclick="window.scrollTo({ top: 0, behavior: 'smooth' })">Top</button>
    </nav>

    <script>
        let MAP;
        let MARKERS = [];
        let genderChartObj = null;
        let statusChartObj = null;

        const AREA_COORDS = {
            'GOPIPURA': [21.1947, 72.8262], 'SAGRAMPURA': [21.1813, 72.8227], 'SALABATPURA': [21.1895, 72.8346],
            'SALABTPURA': [21.1895, 72.8346], 'RUSTAMPURA': [21.1876, 72.8309], 'NANPURA': [21.1888, 72.8250],
            'BEGAMPURA': [21.1961, 72.8358], 'BEGUMPURA': [21.1961, 72.8358], 'UMARWADA': [21.1968, 72.8521],
            'LIMBAYAT': [21.1750, 72.8650], 'RANDER': [21.2125, 72.7917], 'BHESTAN': [21.1216, 72.8611],
            'RUDARPURA': [21.1738, 72.8225], 'UDHNA': [21.1415, 72.8422], 'VARACHHA': [21.2140, 72.8654],
            'KATARGAM': [21.2266, 72.8277], 'ADHAJAN': [21.1818, 72.7958], 'VESU': [21.1396, 72.7761],
            'PIPLOD': [21.1578, 72.7689], 'DINDOLI': [21.1360, 72.8633], 'CHOWK': [21.1960, 72.8220],
            'MAHIDHARPURA': [21.2023, 72.8335], 'SAIYEDPURA': [21.2050, 72.8265], 'SAIYADPURA': [21.2050, 72.8265],
            'BHATHENA': [21.1685, 72.8480], 'LAL DARWAJA': [21.2062, 72.8351], 'NAVSARI BAZAR': [21.1852, 72.8225],
            'ZAMPA BAZAR': [21.1970, 72.8320], 'MOMNAWAD': [21.1895, 72.8250], 'KAPADWANJ': [21.2100, 72.8400],
            'ZAMPA': [21.1970, 72.8320]
        };

        function initMap() {
            MAP = L.map('map', { zoomControl: false, attributionControl: false })
                .setView([21.1702, 72.8311], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(MAP);
        }

        function loadData() {
            const s = document.createElement('script');
            s.src = 'data.js?t=' + Date.now();
            s.onload = () => {
                if (typeof RTE_DATA !== 'undefined') {
                    const filteredData = RTE_DATA.filter(r => {
                        const status = String(r['Status (Gujarati)'] || '').trim();
                        return status !== "Status not found";
                    });

                    updateUI(filteredData, RTE_SUMMARY || {});
                }
            };
            document.head.appendChild(s);
            setTimeout(() => { try { s.remove(); } catch { } }, 6000);
        }

        function updateUI(data, originalSummary) {
            const total = data.length;
            const approved = data.filter(r => r.Result === 'APPROVED').length;
            const submitted = data.filter(r => r.Result === 'SUBMITTED').length;
            const pending = data.filter(r => r.Result === 'PENDING').length;
            const error = data.filter(r => r.Result === 'ERROR').length;

            document.getElementById('tTotal').textContent = total;
            document.getElementById('tApproved').textContent = approved;
            document.getElementById('tSubmitted').textContent = submitted;
            document.getElementById('tPending').textContent = pending;
            document.getElementById('tRejected').textContent = error;
            document.getElementById('updateTs').textContent = 'Last sync: ' + (originalSummary.last_updated || 'Just now');

            const genderData = data.filter(r => r.Result !== 'ERROR');

            let girls = 0, boys = 0;
            let statusCounts = { APPROVED: 0, SUBMITTED: 0, PENDING: 0, ERROR: 0 };
            let areaCounts = {};
            let withArea = 0;

            genderData.forEach(r => {
                const g = String(r.Gender || '').toLowerCase();
                if (g.includes('girl') || g.includes('female') || g.includes('kanya') || g.includes('કન્યા')) girls++;
                else if (g.includes('boy') || g.includes('male') || g.includes('kumar') || g.includes('કુમાર')) boys++;
            });

            data.forEach(r => {
                const res = r.Result || 'PENDING';
                if (statusCounts[res] !== undefined) statusCounts[res]++;

                const gam = String(r.Gam || '').trim().toUpperCase();
                if (gam && gam !== 'N/A' && gam !== 'NAN' && gam !== '' && gam !== 'NONE') {
                    const cleaned = gam.replace(/\s*(CORP\.?|CORPORATION|WARD.*|POLICE.*|NAGAR.*PANCHAYAT)/gi, '')
                        .replace(/\s+/g, ' ').trim();
                    if (cleaned) {
                        areaCounts[cleaned] = (areaCounts[cleaned] || 0) + 1;
                        withArea++;
                    }
                }
            });

            const coveragePct = total > 0 ? Math.round((withArea / total) * 100) : 0;
            document.getElementById('areaCountInfo').textContent = `Mapped: ${withArea} / ${total} (${coveragePct}%)`;
            document.getElementById('areaCoverageNote').innerHTML = `✅ Gender Ratio shows only non-Rejected records (${genderData.length} records)`;

            document.getElementById('vGirls').textContent = girls;
            document.getElementById('vBoys').textContent = boys;

            renderCharts(girls, boys, statusCounts);
            renderAreaList(areaCounts, Object.values(areaCounts).reduce((a, b) => a + b, 0), withArea);
            renderMap(areaCounts);
        }

        function renderCharts(girls, boys, status) {
            if (genderChartObj) genderChartObj.destroy();
            genderChartObj = new Chart(document.getElementById('genderChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Boys', 'Girls'],
                    datasets: [{
                        data: [boys, girls],
                        backgroundColor: ['#3b82f6', '#f472b6'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '70%',
                    plugins: { legend: { display: false } }
                }
            });

            if (statusChartObj) statusChartObj.destroy();
            statusChartObj = new Chart(document.getElementById('statusChart'), {
                type: 'bar',
                data: {
                    labels: ['Approved', 'In Review', 'Pending', 'Rejected'],
                    datasets: [{
                        label: 'Count',
                        data: [status.APPROVED, status.SUBMITTED, status.PENDING, status.ERROR],
                        backgroundColor: ['#10b981', '#3b82f6', '#f59e0b', '#ef4444'],
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#64748b' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#64748b' }
                        }
                    }
                }
            });
        }

        function renderAreaList(counts, areaTotal, withArea) {
            const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 20);
            const list = document.getElementById('areaList');

            if (sorted.length === 0) {
                list.innerHTML = '<li class="area-item"><span style="color:#64748b">No area data yet</span></li>';
                return;
            }

            list.innerHTML = `
            <li class="area-item" style="border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:0.5rem;margin-bottom:0.3rem">
                <span style="color:#94a3b8;font-size:0.78rem">AREA (synced ${withArea})</span>
                <span style="color:#94a3b8;font-size:0.78rem">COUNT</span>
            </li>
            ${sorted.map(([area, count]) => `
                <li class="area-item">
                    <span>${area}</span>
                    <span class="area-count">${count}</span>
                </li>
            `).join('')}
            <li class="area-item" style="border-top:1px solid rgba(255,255,255,0.1);margin-top:0.3rem;padding-top:0.5rem">
                <span style="color:#94a3b8;font-weight:600">TOTAL (mapped)</span>
                <span style="color:#60a5fa;font-weight:700">${areaTotal}</span>
            </li>`;
        }

        function renderMap(counts) {
            MARKERS.forEach(m => MAP.removeLayer(m));
            MARKERS = [];

            const sortedKeys = Object.keys(AREA_COORDS).sort((a, b) => b.length - a.length);

            Object.entries(counts).forEach(([area, count]) => {
                let coord = null;
                for (let key of sortedKeys) {
                    if (area.includes(key) || key.includes(area)) {
                        coord = AREA_COORDS[key];
                        break;
                    }
                }
                if (!coord) return;

                const radius = Math.min(Math.max(count * 2, 8), 50);
                const marker = L.circleMarker(coord, {
                    radius, fillColor: '#3b82f6', color: '#60a5fa',
                    weight: 1, opacity: 0.9, fillOpacity: 0.5
                }).addTo(MAP);

                marker.bindPopup(`
                    <div style="font-family:'Outfit';padding:6px">
                        <b style="color:#1e293b;font-size:1rem">${area}</b><br>
                        <span style="color:#64748b;font-size:0.8rem">Applications: </span>
                        <b style="color:#3b82f6">${count}</b>
                    </div>
                `);

                MARKERS.push(marker);
            });

            setTimeout(() => {
                try {
                    MAP.invalidateSize();
                } catch { }
            }, 80);
        }

        let resizeTimer = null;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                try {
                    if (MAP) MAP.invalidateSize();
                } catch { }
            }, 180);
        });

        window.onload = () => {
            initMap();
            loadData();
            setInterval(loadData, 5000);
        };
    </script>
</body>

</html>
